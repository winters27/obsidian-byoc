<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bring Your Own Cloud (BYOC) for Obsidian</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      line-height: 1.7;
      background: #0d0f14;
      color: #c6cdd5;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    .container { max-width: 640px; }
    h1 { font-size: 2rem; color: #e8ecf0; margin-bottom: 1rem; }
    p { font-size: 1rem; color: #8b95a3; margin-bottom: 2rem; }
    .links { display: flex; gap: 1.5rem; justify-content: center; }
    a { color: #4285f4; text-decoration: none; font-weight: 500; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Bring Your Own Cloud</h1>
    <p>A native, open-source sync engine for Obsidian. Connect your own storage providers (Google Drive, OneDrive, Dropbox, and more) directly inside your vault on both Desktop and Mobile.</p>
    
    <div class="links">
      <a href="https://github.com/winters27/obsidian-byoc">GitHub Repository</a>
      <a href="/privacy.html">Privacy Policy</a>
    </div>
  </div>
</body>
</html>
