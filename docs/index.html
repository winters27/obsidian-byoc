<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bring Your Own Cloud (BYOC) for Obsidian</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d0f14;
      color: #c6cdd5;
      padding: 2rem;
    }
    .card {
      max-width: 520px;
      width: 100%;
      padding: 3rem 2.5rem;
      border-radius: 16px;
      background: rgba(30, 34, 44, 0.85);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      text-align: center;
    }
    .icon {
      width: 64px; height: 64px;
      margin: 0 auto 1.5rem;
      border-radius: 16px;
      background: rgba(147, 51, 234, 0.15); /* Purple accent for BYOC */
      display: flex; align-items: center; justify-content: center;
      box-shadow: inset 0 0 0 1px rgba(147, 51, 234, 0.3);
    }
    .icon svg { width: 32px; height: 32px; color: #a855f7; }
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      color: #e8ecf0;
      margin-bottom: 1rem;
      letter-spacing: -0.01em;
    }
    p {
      font-size: 0.9375rem;
      line-height: 1.6;
      color: #8b95a3;
      margin-bottom: 2.5rem;
    }
    .links {
      display: flex; gap: 1rem; justify-content: center;
      flex-wrap: wrap;
    }
    a {
      padding: 0.625rem 1.25rem;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.2s ease;
    }
    .primary-link {
      background: rgba(147, 51, 234, 0.2);
      color: #d8b4fe;
      border: 1px solid rgba(147, 51, 234, 0.4);
    }
    .primary-link:hover {
      background: rgba(147, 51, 234, 0.3);
    }
    .secondary-link {
      background: rgba(255, 255, 255, 0.04);
      color: #c6cdd5;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    .secondary-link:hover {
      background: rgba(255, 255, 255, 0.08);
      color: #e8ecf0;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <!-- Sync/Cloud generic icon derived from BYOC context -->
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/>
        <path d="M12 12v5"/>
        <path d="m9 14 3-3 3 3"/>
      </svg>
    </div>
    <h1>Bring Your Own Cloud</h1>
    <p>A native, open-source sync engine for Obsidian. Connect your own storage providers directly inside your vault on both Desktop and Mobile. No middleman servers.</p>
    
    <div class="links">
      <a href="https://github.com/winters27/obsidian-byoc" class="primary-link">GitHub Repository</a>
      <a href="/privacy.html" class="secondary-link">Privacy Policy</a>
    </div>
  </div>
</body>
</html>
