<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BYOC — Google Drive Authorization</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d0f14;
      color: #c6cdd5;
    }
    .card {
      max-width: 420px;
      width: 90%;
      padding: 2.5rem 2rem;
      border-radius: 16px;
      background: rgba(30, 34, 44, 0.85);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      text-align: center;
    }
    .icon {
      width: 48px; height: 48px;
      margin: 0 auto 1.25rem;
      border-radius: 12px;
      background: rgba(66, 133, 244, 0.15);
      display: flex; align-items: center; justify-content: center;
    }
    .icon svg { width: 24px; height: 24px; }
    h1 {
      font-size: 1.125rem;
      font-weight: 600;
      color: #e8ecf0;
      margin-bottom: 0.5rem;
    }
    .subtitle {
      font-size: 0.875rem;
      line-height: 1.5;
      color: #8b95a3;
      margin-bottom: 1.5rem;
    }
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid rgba(66, 133, 244, 0.2);
      border-top-color: #4285f4;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: inline-block;
      vertical-align: middle;
      margin-right: 0.5rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status { font-size: 0.875rem; color: #8b95a3; }
    .success { color: #a6e3a1; }
    .error { color: #f38ba8; }

    /* Fallback section — hidden until timeout */
    .fallback { display: none; margin-top: 1.5rem; }
    .fallback.visible { display: block; }
    .fallback p { font-size: 0.8125rem; color: #8b95a3; margin-bottom: 0.75rem; }
    .code-box {
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.75rem;
      color: #c6cdd5;
      word-break: break-all;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .code-box:hover { border-color: rgba(66, 133, 244, 0.4); }
    .copied { font-size: 0.75rem; color: #a6e3a1; margin-top: 0.5rem; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M15.09 3.75L22.5 16.5H15.09L7.68 3.75H15.09Z" fill="#4285F4"/>
        <path d="M7.68 3.75L15.09 16.5H1.5L7.68 3.75Z" fill="#0F9D58"/>
        <path d="M15.09 16.5H22.5L18.79 22.5H8.41L15.09 16.5Z" fill="#FBBC05"/>
        <path d="M1.5 16.5L5.21 22.5H8.41L15.09 16.5H1.5Z" fill="#EA4335"/>
      </svg>
    </div>
    <h1 id="title">Redirecting to Obsidian…</h1>
    <p class="subtitle" id="subtitle">Completing Google Drive authorization.</p>
    <div class="status" id="status">
      <span class="spinner"></span>
      Connecting…
    </div>
    <div class="fallback" id="fallback">
      <p>If Obsidian didn't open automatically, copy the code below and paste it in the plugin settings:</p>
      <div class="code-box" id="code-box" onclick="copyCode()"></div>
      <div class="copied" id="copied-msg"></div>
    </div>
  </div>

  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var code = params.get("code");
      var error = params.get("error");

      var titleEl = document.getElementById("title");
      var subtitleEl = document.getElementById("subtitle");
      var statusEl = document.getElementById("status");
      var fallbackEl = document.getElementById("fallback");
      var codeBoxEl = document.getElementById("code-box");

      if (error) {
        titleEl.textContent = "Authorization failed";
        subtitleEl.textContent = error;
        statusEl.innerHTML = '<span class="error">Please close this tab and try again.</span>';
        return;
      }

      if (!code) {
        titleEl.textContent = "Missing authorization code";
        subtitleEl.textContent = "No code was received from Google.";
        statusEl.innerHTML = '<span class="error">Please close this tab and try again.</span>';
        return;
      }

      // Redirect to Obsidian via protocol handler
      var obsidianUri = "obsidian://bring-your-own-cloud-cb-googledrive?code=" + encodeURIComponent(code);
      window.location.href = obsidianUri;

      // After a short delay, update UI to success
      setTimeout(function () {
        titleEl.textContent = "Authorization successful";
        subtitleEl.textContent = "You can close this tab.";
        statusEl.innerHTML = '<span class="success">✓ Sent to Obsidian</span>';
      }, 1500);

      // Fallback: if Obsidian didn't catch it after 4s, show the code
      setTimeout(function () {
        codeBoxEl.textContent = code;
        fallbackEl.classList.add("visible");
      }, 4000);
    })();

    function copyCode() {
      var code = document.getElementById("code-box").textContent;
      navigator.clipboard.writeText(code).then(function () {
        document.getElementById("copied-msg").textContent = "Copied!";
      });
    }
  </script>
</body>
</html>
